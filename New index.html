<!DOCTYPE html>
<html>
<head>
  <title>GyanPulse</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #0d6efd;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 10px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .card:hover {
      transform: scale(1.02);
      transition: 0.2s;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
    }
    .desc {
      color: gray;
    }
  </style>
</head>

<body>

<header>
  <h1>📚 GyanPulse</h1>
</header>

<div class="container" id="articles"></div>

<script>
fetch("articles.json")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("articles");

  data.forEach(a => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${a.title}</div>
      <div class="desc">${a.content.substring(0,100)}...</div>
    `;

    card.onclick = () => {
      window.location.href = "article.html?id=" + a.id;
    };

    container.appendChild(card);
  });
});
</script>

</body>
</html>
